<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agenda App</title>
</head>

<body>
  <h2>📅 Agenda</h2>

  <input id="title" placeholder="ชื่อวาระ"><br><br>
  <input id="datetime" type="datetime-local"><br><br>
  <input id="location" placeholder="📍 สถานที่"><br><br>
  <input id="president" placeholder="👤 ประธาน"><br><br>
  <input id="dress" placeholder="👔 การแต่งกาย"><br><br>
  <input id="dept" placeholder="🏢 กลุ่มงาน"><br><br>

  <textarea id="detail" placeholder="รายละเอียด"></textarea><br><br>

  <button onclick="addData()">บันทึก</button>

  <hr>

  <div id="list"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "🔥 AIzaSyBO0tz1jV3cggUgWpcQ6L1fEhOMI4Pq2dk",
      authDomain: "🔥 schedu-sumet.firebaseapp.com",
      projectId: "🔥 schedu-sumet"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // เพิ่มข้อมูล
    window.addData = async function () {
      await addDoc(collection(db, "agenda"), {
        title: document.getElementById("title").value,
        datetime: document.getElementById("datetime").value,
        location: document.getElementById("location").value,
        president: document.getElementById("president").value,
        dress: document.getElementById("dress").value,
        dept: document.getElementById("dept").value,
        detail: document.getElementById("detail").value,
      });
    };

    // โหลดข้อมูล realtime
    onSnapshot(collection(db, "agenda"), (snapshot) => {
      let html = "";
      snapshot.forEach(doc => {
        let d = doc.data();
        html += `
          <div style="border:1px solid #ccc; margin:10px; padding:10px; border-radius:10px;">
            <b>${d.title}</b><br>
            🕒 ${d.datetime}<br>
            📍 ${d.location}<br>
            👤 ${d.president}<br>
            👔 ${d.dress}<br>
            🏢 ${d.dept}<br>
            📝 ${d.detail}
          </div>
        `;
      });
      document.getElementById("list").innerHTML = html;
    });
  </script>

</body>
</html>
